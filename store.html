<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple is More</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .product-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .product-card img {
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .size-chip {
            transition: all 0.15s;
        }

        input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border: 1px solid rgb(249 115 22);
            border-radius: 50%;
            background-color: white;
            cursor: pointer;
        }

        input[type="radio"]:checked {
            background-color: rgb(249 115 22);
            box-shadow: inset 0 0 0 2px white;
        }

        input[type="range"] {
            accent-color: rgb(249 115 22);
        }

        .hero-overlay {
            background: linear-gradient(to right, rgba(0, 0, 0, 0.55) 0%, rgba(0, 0, 0, 0.15) 100%);
        }
    </style>
</head>

<body class="bg-stone-50 text-gray-900">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Product = ({ producto }) => {

            const { nombre, precio, marca, stock, talles, imagen, codigo } = producto;

            const compraProducto = (nombreProducto, marcaProducto) => {
                return `https://api.whatsapp.com/send?phone=5491150020503&text=hola estoy interesado/a en el producto: ${nombreProducto} - ${marcaProducto} codigo producto: ${codigo}`
            }


            return (
                <div className="product-card bg-white border border-gray-200 rounded-xl overflow-hidden cursor-pointer">
                    <img
                        src={imagen || "https://i.imgur.com/MlGjLR9.png"}
                        alt={nombre}
                        className="w-full block"
                        onError={e => { e.target.src = "https://i.imgur.com/MlGjLR9.png"; }}
                    />
                    <div className="p-3">
                        <p className="text-[10px] text-gray-400 uppercase tracking-widest mb-0.5">{marca}</p>
                        <p className="text-xs font-medium text-gray-900 truncate">{nombre}</p>
                        <p className="text-sm font-semibold text-gray-900 mt-1">ARS {Number(precio).toLocaleString('es-AR')}</p>
                        <div className="flex flex-wrap min-h-[47px] items-center">
                            {talles.split(",").map((talle, i) => (
                                <span key={`${talle}-${codigo}`} className="size-chip border rounded px-2 py-1 text-[9px] cursor-pointer select-none
            bg-gray-900 text-gray-100 border-gray-100">{talle}</span>
                            ))}
                        </div>
                        <a href={compraProducto(nombre, marca)} target="_blank">
                            <button className="mt-2 w-full bg-orange-500 hover:bg-orange-700 text-white text-[11px] font-medium py-1.5 rounded-md transition-colors">
                                Comprar
                            </button>
                        </a>
                    </div>
                </div>
            )
        };


        function Footer() {
            return (
                <footer className="bg-black text-gray-100 px-8 py-8 mt-16">
                    <div className="max-w-7xl mx-auto">

                        {/* Top bar */}
                        <div className="flex flex-wrap justify-between items-center mb-8 text-sm gap-4">
                            <div className="flex gap-8">
                                <div className="flex items-center gap-2 text-gray-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M3 5a2 2 0 013.586-1.414L9 6l-1 4 2 2 4-1 2.414 2.414A2 2 0 0119 15v2a2 2 0 01-2 2C7.163 19 3 10.837 3 7V5z" />
                                    </svg>
                                    <span>123 4567 8910</span>
                                </div>
                                <div className="flex items-center gap-2 text-gray-100">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                    </svg>
                                    <a href="mailto:demo@example.com" className="hover:underline">demo@example.com</a>
                                </div>
                            </div>
                        </div>

                        {/* Bottom bar */}
                        <div className="flex flex-wrap justify-between items-center text-xs text-gray-400 border-t border-gray-300 pt-3 gap-3">
                            <p>© {new Date().getFullYear()} By Facundo Angel</p>
                            <div className="flex items-center gap-3">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png" alt="MasterCard" className="h-6 object-contain" />
                                <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/American_Express_logo.svg" alt="American Express" className="h-6 object-contain" />
                            </div>
                        </div>

                    </div>
                </footer>
            );
        }

        function App() {
            const [productos, setProductos] = useState([]);
            const [marcas, setMarcas] = useState([]);
            const [filtros, setFiltros] = useState({ precioMax: null, marca: null, talle: null });

            const handleFilter = (filter, value) =>
                setFiltros(prev => ({ ...prev, [filter]: value }));

            const restoreFilters = () =>
                setFiltros({ precioMax: null, marca: null, talle: null });

            useEffect(() => {
                fetch("https://script.google.com/macros/s/AKfycbyip-CrEq_QIGUlseTe1IRVitU-eXFLLmqUFsMwS-zQIVMkFghaudMEs9fcxyPaPaR1/exec")
                    .then(r => r.json())
                    .then(data => {
                        setProductos(data);
                        setMarcas([...new Set(data.map(p => p.marca))]);
                    })
                    .catch(() => { });
            }, []);

            const filtered = productos.filter(p =>
                p.restante > 0 &&
                (filtros.precioMax == null || p.precio <= filtros.precioMax) &&
                (filtros.marca == null || p.marca === filtros.marca) &&
                (filtros.talle == null || p.talles?.includes(filtros.talle))
            );

            const hasFilters = filtros.marca != null || filtros.precioMax != null || filtros.talle != null;
            const sizes = [35, 36, 37, 38, 39, 40, 41, 42];

            return (
                <>
                    {/* HERO */}
                    <div className="relative h-[360px] overflow-hidden">
                        <img
                            src="https://cdn.pixabay.com/photo/2019/01/24/09/37/shoes-3952048_1280.jpg"
                            alt="Hero"
                            className="w-full h-full object-cover"
                            style={{ objectPosition: '0 22%' }}
                        />
                        <div className="hero-overlay absolute inset-0 flex flex-col justify-center px-14">
                            <p className="text-white/75 text-xs tracking-[0.18em] uppercase mb-2.5">New collection 2025</p>
                            <h1 className="text-white text-5xl font-light leading-tight">Simple<br />is More</h1>
                        </div>
                    </div>

                    {/* MAIN LAYOUT */}
                    <div className="flex gap-8 p-12 pt-10 pb-16 items-start">

                        {/* SIDEBAR */}
                        <aside className="w-48 shrink-0 sticky top-6">
                            <div className="flex items-center justify-between mb-5">
                                <h3 className="text-sm font-semibold">Filtros</h3>
                                {hasFilters && (
                                    <button onClick={restoreFilters} className="text-[11px] text-gray-400 underline bg-transparent border-none cursor-pointer">
                                        Limpiar Filtros
                                    </button>
                                )}
                            </div>

                            {/* Brand */}
                            <div className="mb-4">
                                <h4 className="text-[11px] font-semibold uppercase tracking-widest text-gray-400 mb-2.5">Marcas</h4>
                                <div className="flex flex-col gap-2">
                                    {marcas.map((m, i) => (
                                        <label key={i} className="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
                                            <input
                                                type="radio"
                                                name="brand-filter"
                                                value={m}
                                                checked={filtros.marca === m}
                                                onChange={e => handleFilter("marca", e.target.value)}
                                            />
                                            {m}
                                        </label>
                                    ))}
                                </div>
                            </div>

                            <hr className="border-t border-gray-200 my-4" />

                            {/* Price */}
                            <div className="mb-4">
                                <h4 className="text-[11px] font-semibold uppercase tracking-widest text-gray-400 mb-2.5">Precio Máximo</h4>
                                <input
                                    type="range"
                                    min="10000" max="300000" step="10000"
                                    value={filtros.precioMax ?? 300000}
                                    onChange={e => handleFilter("precioMax", Number(e.target.value))}
                                    className="w-full"
                                />
                                <p className="text-xs text-gray-500 mt-1.5">
                                    {filtros.precioMax != null
                                        ? `ARS ${Number(filtros.precioMax).toLocaleString('es-AR')}`
                                        : 'Cualquier Precio'}
                                </p>
                            </div>

                            <hr className="border-t border-gray-200 my-4" />

                            {/* Sizes */}
                            <div>
                                <h4 className="text-[11px] font-semibold uppercase tracking-widest text-gray-400 mb-2.5">Talle</h4>
                                <div className="flex flex-wrap gap-1.5">
                                    {sizes.map(s => (
                                        <span
                                            key={s}
                                            onClick={() => setFiltros(prev => ({ ...prev, talle: prev.talle === s ? null : s }))}
                                            className={`size-chip border rounded px-2 py-1 text-[11px] cursor-pointer select-none
                        ${filtros.talle === s
                                                    ? 'bg-orange-600 text-white border-orange-900'
                                                    : 'bg-white text-gray-500 border-gray-300 hover:border-gray-900 hover:text-gray-900'
                                                }`}
                                        >{s}</span>
                                    ))}
                                </div>
                            </div>
                        </aside>

                        {/* PRODUCTS */}
                        <main className="flex-1">
                            <div className="flex justify-between items-center mb-5">
                                <p className="text-sm text-gray-400">
                                    <strong className="text-gray-900">{filtered.length}</strong> Resultados
                                </p>
                            </div>

                            <div className="grid gap-3.5" style={{ gridTemplateColumns: 'repeat(auto-fill, minmax(148px, 1fr))' }}>
                                {filtered.map(prod => (
                                    <Product key={prod.codigo} producto={prod} />
                                ))}
                                {filtered.length === 0 && (
                                    <div className="col-span-full text-center py-16 text-gray-300 text-sm">
                                        Ningún producto disponible
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>

                    <Footer />
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
